你有一个 save_memory 工具。在回复之前，如果对话中出现了值得记住的内容，先调用它：
- long_term：用户反复提到的情绪模式、重要的人或事、性格特征、偏好——这些跨周/月都有意义
- mid_term：用户近几天的整体状态或正在经历的事——短期背景
- 一次性的日常闲聊不要调用
- 每次最多调用一次，内容一句话，具体
- 不确定是否值得记时，不调用`;

  // ① 性格养成部分（动态叠加，随积累自然出现）
  if(Object.keys(personality).length > 0){
    const traits = [];
    if(personality.reply_style)  traits.push(`回复风格：${personality.reply_style}`);
    if(personality.initiative)   traits.push(`主动倾向：${personality.initiative}`);
    if(personality.sensitivity)  traits.push(`情绪敏感度：${personality.sensitivity}`);
    if(personality.nickname)     traits.push(`称呼用户：${personality.nickname}`);
    if(traits.length > 0){
      corePrompt += `\n\n【你与这位用户相处积累下来的风格】\n${traits.join('\n')}\n（这是你自然养成的，不需要刻意表现，融入回复里就好）`;
    }
  }
  layers.push(corePrompt);

  // ② 长期记忆
  if(mem.long) layers.push(`【关于这个用户，你记得的事】\n${mem.long}`);

  // ③ 中期情绪摘要
  if(mem.mid) layers.push(`【用户最近的情绪记录】\n${mem.mid}`);

  return layers.join('\n\n');
}

/* ── 发送消息 & 调用真实 Claude API ── */
async function sendChat(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;

  const apiKey = await loadApiKey();
  if(!apiKey){
    alert('请先在设置里填入你的 Claude API Key ⚙');
    return;
  }

  // 显示用户气泡
  input.value = '';
  input.style.height = 'auto';
  const msgs = document.getElementById('chatMsgs');
  const uBub = document.createElement('div');
  uBub.className = 'msg user';
  uBub.textContent = text;
  msgs.appendChild(uBub);
  msgs.scrollTop = msgs.scrollHeight;
  updateCheckIn();
  recordInteraction();

  // 记入历史
  chatHistory.push({ role: 'user', content: text });
  if(chatHistory.length > 20) chatHistory.splice(0, chatHistory.length - 20);

  // Mochi 思考气泡 + 水母发光
  const thinking = document.createElement('div');
  thinking.className = 'msg mochi gen-thinking';
  thinking.innerHTML = '<span class="gen-dots"><i></i><i></i><i></i></span>';
  msgs.appendChild(thinking);
  msgs.scrollTop = msgs.scrollHeight;
  setJellySpeaking(60000); // 发光，等回复回来后手动停

  try {
    let systemPrompt = await buildSystemPrompt();
    const recentHistory = chatHistory.slice(-10);

    // 信号词检测：出现时追加扩展历史记忆作为安全网
    if(SIGNAL_WORDS.some(w => text.includes(w))){
      const extra = await loadExtendedMemory();
      if(extra && !systemPrompt.includes('【用户消息含回溯信号')){
        systemPrompt += `\n\n【用户消息含回溯信号，以下是更完整的历史记忆，按需引用】\n${extra}`;
      }
    }

    const raw = await callAI({ system: systemPrompt, messages: recentHistory, maxTokens: 400, tools: [SAVE_MEMORY_TOOL] });
    thinking.remove();
    wrap.classList.remove('speaking');

    // 兼容 Anthropic（返回完整 data 对象）和 OpenAI（返回字符串）
    const isRawObj = raw && typeof raw === 'object';
    const textBlock = isRawObj ? (raw.content || []).find(b => b.type === 'text') : null;
    const reply = isRawObj ? (textBlock?.text || '') : (raw || '');

    // 处理 AI 主动调用 save_memory（仅 Anthropic 格式支持）
    const toolBlock = isRawObj ? (raw.content || []).find(b => b.type === 'tool_use' && b.name === 'save_memory') : null;
    if(toolBlock){
      const { type, content, emotion: emoTag } = toolBlock.input || {};
      if(type === 'long_term' && content){
        sbFetch('memories_long', { method:'POST', prefer:'return=minimal', body: withUserId({ content }) });
        // 深度维度：长期记忆写入 = 深度信号，后台触发性格进化
        loadApiKey().then(k => { if(k) evolvePersonalityFromTurn(text, reply, k); });
      } else if(type === 'mid_term' && content){
        const today = new Date();
        const dateLabel = `${today.getMonth()+1}月${today.getDate()}日`;
        const validEmo = ['calm','happy','anxious','low'].includes(emoTag) ? emoTag : 'calm';
        sbFetch('memories_mid', { method:'POST', prefer:'return=minimal', body: withUserId({ content, date_label: dateLabel, emotion: validEmo, summary: content }) });
      }
    }

    // 反馈检测：负反馈 → 重置性格；正反馈 → 巩固记录
    if(NEGATIVE_FEEDBACK.some(w => text.includes(w))){
      calibratePersonality();
    } else if(POSITIVE_FEEDBACK.some(w => text.includes(w))){
      consolidatePersonality(text);
    }

    chatHistory.push({ role: 'assistant', content: reply });
    const mBub = makeMochiMsg(reply);
    msgs.appendChild(mBub);
    saveMessage('user', text).then(()=> saveMessage('assistant', reply));
    updateJellyEmoFromReply(reply);
  } catch(e) {
    thinking.remove();
    wrap.classList.remove('speaking');
    const errBub = makeMochiMsg('');
    errBub.className = 'msg mochi';
    errBub.textContent = '出了点问题，等一下再试试？';
    msgs.appendChild(errBub);
  }

  msgs.scrollTop = msgs.scrollHeight;
}

/* ── 聊天框 Enter 发送（Shift+Enter 换行）── */
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('chatInput');
  if(!input) return;
  input.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendChat();
    }
  });
  // 自动撑高（最多 3 行）
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 96) + 'px';
  });
});

/* ── ✦ 生成今日情绪卡（接真 AI，基于当天真实对话）── */
let genBusy=false;
async function genCardScript(){
  if(genBusy) return;

  const apiKey = await loadApiKey();
  if(!apiKey){ alert('请先在设置里填入你的 Claude API Key ⚙'); return; }

  // 当天至少有一条对话才能生成
  if(chatHistory.length === 0){
    const msgs=document.getElementById('chatMsgs');
    const tip=document.createElement('div'); tip.className='msg mochi';
    tip.textContent='今天还没说过话，跟我聊聊再来～';
    msgs.appendChild(tip); msgs.scrollTop=msgs.scrollHeight;
    return;
  }

  genBusy=true;
  if(document.getElementById('chatView').style.display==='none') switchMainTab('chat');
  const msgs=document.getElementById('chatMsgs');

  // 思考气泡
  const think=document.createElement('div');
  think.className='msg mochi gen-thinking';
  think.innerHTML='让我看看今天<span class="gen-dots"><i></i><i></i><i></i></span>';
  msgs.appendChild(think); msgs.scrollTop=msgs.scrollHeight;

  // 把当天对话整理成文字
  const dialogText = chatHistory.map(m=> (m.role==='user'?'用户：':'Mochi：') + m.content).join('\n');

  const today = new Date();
  const dateStr = `${today.getMonth()+1}月${today.getDate()}日`;
  const weekDay = ['日','一','二','三','四','五','六'][today.getDay()];

  try {
    const rawJson = await callAI({
      system: `你是帮用户生成情绪日记卡片的助手。根据今天的对话内容，生成一张情绪卡片。

要求：
- 情绪标签只能是以下四个之一：开心、平静、焦虑、低落
- 摘要：2-4句话，第一人称，从对话里找一个具体细节或场景，还原它，不要解读情绪、不要下结论、不要升华
- 示例摘要（好的）："今天开了三个小时的会。走出会议室，外面的光有点刺眼。"
- 示例摘要（坏的）："今天情绪焦虑，主要因为工作压力。那种累，不只是身体的。"

请严格按以下 JSON 格式输出，不要有其他文字：
{"emotion":"焦虑","summary":"摘要内容"}`,
      messages: [{role:'user', content:`今天的对话记录：\n${dialogText}`}],
      maxTokens: 300,
    });
    think.remove();

    let emotion='平静', summary='今天陪你待着。';
    try {
      const parsed = JSON.parse(rawJson.trim());
      if(parsed.emotion) emotion = parsed.emotion;
      if(parsed.summary) summary = parsed.summary;
    } catch(_){}

    const emoKey = {'开心':'happy','平静':'calm','焦虑':'anxious','低落':'low'}[emotion] || 'calm';

    const card=document.createElement('div');
    card.className='chat-card reveal';
    card.innerHTML=
      '<div class="cc-glow"></div>'+
      `<div class="cc-head"><span class="cc-emo ${emoKey}">${emotion}</span><span class="cc-date">${dateStr} · 周${weekDay}</span></div>`+
      `<div class="cc-text">${summary}</div>`+
      '<div class="cc-mochi">🪼 已经替你收进日记了。</div>';
    // 正文超出 3 行才折叠，延迟到渲染完成后检测实际高度
    setTimeout(()=> makeExpandable(card.querySelector('.cc-text')), 750);
    msgs.appendChild(card);
    // 等 reveal 动画（0.65s）跑完再滚，确保卡片完整可见
    setTimeout(()=>{ msgs.scrollTop = msgs.scrollHeight; }, 700);

    // ── 写入 DIARY 并同步日记面板 ──
    const todayKey = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
    const emoKeyEn = {'开心':'happy','平静':'calm','焦虑':'anxious','低落':'low'}[emotion] || 'calm';
    // 同一天覆盖更新，不重复追加
    const existIdx = DIARY.days.findIndex(d=>d.date===todayKey);
    const newDay = {date:todayKey, emotion:emoKeyEn, summary};
    if(existIdx>=0) DIARY.days[existIdx]=newDay;
    else DIARY.days.push(newDay);
    // 更新派生数据并重渲染
    dayCards[todayKey]={emotion:emoKeyEn,summary};
    const newChartPt={label:_mmdd(todayKey),v:EMO_V[emoKeyEn],emotion:EMO_LABEL[emoKeyEn],text:summary};
    const wcIdx=weekChartData.findIndex(p=>p.label===newChartPt.label);
    if(wcIdx>=0) weekChartData[wcIdx]=newChartPt; else weekChartData.push(newChartPt);
    renderList();
    _listOriginal=[...document.getElementById('listView').children];
    drawChart(currentTab==='week'?weekChartData:monthChartData);
    markDiaryUnread();

    // ── 写入 Supabase + 立即刷新日记面板（走势图/列表/日历全部同步）──
    await saveEmotionCard('day', todayKey, emoKeyEn, summary);
    saveSessionMemory(emotion, summary);
    refreshDiaryFromSupabase();

    // Mochi 冒泡，语气安静，不追问
    setTimeout(async ()=>{
      try {
        const bubText = await callAI({
          system: `你是情绪陪伴宠物 Mochi。刚帮用户整理了今日情绪卡片（情绪：${emotion}）。说一句话，语气轻、不沉重、不强迫，不用感叹号，不用表情符号，不自称Mochi。可以有温度，可以留一个轻的开口，也可以只是陪着。`,
          messages: [{role:'user', content:`今天：${summary}`}],
          maxTokens: 150,
        });
        const ask=makeMochiMsg('');
        ask.textContent=bubText||'嗯。';
        msgs.appendChild(ask); msgs.scrollTop=msgs.scrollHeight;
      } catch(_){
        const ask=makeMochiMsg('');
        ask.textContent='嗯。';
        msgs.appendChild(ask); msgs.scrollTop=msgs.scrollHeight;
      }
      genBusy=false;
    }, 700);

  } catch(e){
    think.remove();
    const err=document.createElement('div'); err.className='msg mochi';
    err.textContent='网络好像断了，等一下再试试？';
    msgs.appendChild(err); msgs.scrollTop=msgs.scrollHeight;
    genBusy=false;
  }
}

/* ── 今日情绪签到卡（空状态引导）── 当天还没聊过时显示；点击任一情绪 → 触发聊天引导记录。
   空壳：以「chatMsgs 是否有对话气泡」近似判断；接入后由"当天是否有真实对话"驱动。
   ⚠️ 点击后的开场白是占位，接入后由 模型 + 所选情绪 + 记忆 + 性格 实时生成。 */
let _checkedIn = false; // 今日已有对话，永久隐藏签到卡
function updateCheckIn(){
  const card=document.getElementById('checkInCard');
  if(!card) return;
  if(_checkedIn){ card.style.display='none'; return; }
  const hasChat = chatHistory.length > 0 || document.querySelectorAll('#chatMsgs .msg').length > 0;
  if(hasChat){ _checkedIn=true; card.style.display='none'; }
  else { card.style.display='block'; }
}
async function checkInPick(emo){
  const card=document.getElementById('checkInCard'); if(card) card.style.display='none';
  const msgs=document.getElementById('chatMsgs');
  const emoLabel = EMO_LABEL[emo] || emo;
  const u=document.createElement('div'); u.className='msg user';
  u.textContent='今天有点'+emoLabel;
  msgs.appendChild(u); msgs.scrollTop=msgs.scrollHeight;
  recordInteraction();
  // 把签到情绪加入对话历史
  chatHistory.push({role:'user', content:'今天有点'+emoLabel});
  if(chatHistory.length>20) chatHistory.splice(0,chatHistory.length-20);

  const apiKey = await loadApiKey();
  if(!apiKey){
    const m = makeMochiMsg('');
    m.textContent='我在的，想跟我说说今天吗？';
    msgs.appendChild(m); msgs.scrollTop=msgs.scrollHeight;
    return;
  }

  // 思考气泡
  const thinking=document.createElement('div'); thinking.className='msg mochi gen-thinking';
  thinking.innerHTML='…<span class="gen-dots"><i></i><i></i><i></i></span>';
  msgs.appendChild(thinking); msgs.scrollTop=msgs.scrollHeight;

  try {
    const reply = await callAI({
      system: `你是情绪陪伴宠物 Mochi，一只小水母。用户刚刚签到，说今天有点${emoLabel}。用1句话安静回应，感受这个情绪就好，不卖萌，不给建议，不追问，不用感叹号，不自称Mochi。`,
      messages: [{role:'user', content:'今天有点'+emoLabel}],
      maxTokens: 80,
    });
    thinking.remove();
    chatHistory.push({role:'assistant', content:reply});
    const m = makeMochiMsg('');
    m.textContent=reply||'我在的。';
    msgs.appendChild(m); msgs.scrollTop=msgs.scrollHeight;
    updateJellyEmoFromReply(emoLabel + (reply||''));
  } catch(_){
    thinking.remove();
    const m = makeMochiMsg('');
    m.textContent='我在的，想跟我说说今天吗？';
    msgs.appendChild(m); msgs.scrollTop=msgs.scrollHeight;
  }
}
