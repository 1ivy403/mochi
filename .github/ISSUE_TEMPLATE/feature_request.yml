name: Feature Request
description: 提一个功能建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你在什么情况下需要这个功能？
      placeholder: "我在 xxx 的时候，希望能 xxx"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你设想的实现方式（可选）
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 你现在怎么处理这个需求？
    validations:
      required: false
